name: Test

on:
  push:

# thanks to https://izumisy.work/entry/2022/03/28/140644
jobs:
  ubuntu-2204:
    name: ubuntu-2204
    runs-on: Ubuntu-latest
    container:
      image: ubuntu:22.04
    steps:
    - name: Install libraries
      run: |
        apt-get update
        apt-get upgrade -y
        apt-get install -y git build-essential g++ libomp-dev cmake git ninja-build
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: build
      run: |
        cmake . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DTFHEPP_ARCH_FLAGS='-march=x86-64-v3 -maes -mpclmul' -DENABLE_TEST=ON -DENABLE_AXELL=ON
        cd build
        ninja
    - name: test
      run: |
        cd build
        test/test.sh
  ubuntu-2404:
    name: ubuntu-2404
    runs-on: Ubuntu-latest
    container:
      image: ubuntu:24.04
    steps:
    - name: Install libraries
      run: |
        apt-get update
        apt-get upgrade -y
        apt-get install -y git build-essential g++ libomp-dev cmake git ninja-build libgoogle-perftools-dev
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: build
      run: |
        cmake . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DENABLE_TEST=ON -DENABLE_AXELL=ON
        cd build
        ninja
    - name: test
      run: |
        cd build
        test/test.sh
  ubuntu-2404-clang:
    name: ubuntu-2404-clang
    runs-on: Ubuntu-latest
    container:
      image: ubuntu:24.04
    steps:
    - name: Install libraries
      run: |
        apt-get update
        apt-get upgrade -y
        apt-get install -y git build-essential g++ libomp-dev cmake git ninja-build clang-18 lld-18 libgoogle-perftools-dev
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: build
      run: |
        cmake . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=clang++-18 -DCMAKE_C_COMPILER=clang-18 -DENABLE_TEST=ON -DENABLE_AXELL=ON
        cd build
        ninja
    - name: test
      run: |
        cd build
        test/test.sh
